<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tic Tac Toe</title>
	<style>
		body {
			margin: 0;
			background: #1e1e1e;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
	</style>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
	<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
</head>
<body>
	<div id="terminal"></div>
	<script>
		var terminal = new Terminal({cols: 100, rows: 20, cursorBlink: false, disableStdin: true});
		var Module = {
			print: function(text) {
				terminal.writeln(text);
			},
			printErr: function(text) {
				terminal.writeln(text);
			},
		};
		terminal.open(document.getElementById('terminal'));
	</script>
	{{{ SCRIPT }}}
</body>
</html>
